services:
  pandoc:
    build: .
    container_name: pandoc-service
    restart: unless-stopped
    ports:
      - "3333:3333"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./app.py:/app/app.py
      - ./templates:/app/templates
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3333/"]
      interval: 30s
      timeout: 10s
      retries: 3
